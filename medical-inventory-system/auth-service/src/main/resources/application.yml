spring:
  application:
    name: auth-service
  config:
    import: optional:configserver:http://localhost:8888

  # ── Database (standalone local mode) ────────────────────────
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

# ── JWT ────────────────────────────────────────────────────────
jwt:
  secret-key: medical-inventory-super-secret-key-that-is-at-least-256-bits-long-for-hs256
  expiration-ms: 3600000
  refresh-expiration-ms: 86400000
  issuer: medical-inventory-auth-service

# ── Eureka ─────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ── Springdoc ──────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Actuator ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.medicalinventory: DEBUG
