server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/medical-inventory

# JWT Configuration
jwt:
  secret-key-path: classpath:keys/private.pem
  public-key-path: classpath:keys/public.pem
  expiration-ms: 3600000       # 1 hour
  refresh-expiration-ms: 86400000  # 24 hours

# Keycloak SSO
keycloak:
  auth-server-url: http://localhost:8090
  realm: medical-inventory
  client-id: med-inventory-app
  client-secret: ${KEYCLOAK_CLIENT_SECRET:change-me}

# gRPC server for token validation
grpc:
  server:
    port: 9091

# Springdoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
